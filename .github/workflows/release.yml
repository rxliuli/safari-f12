name: Release

on:
  push:
    branches: [main]
    paths:
      - 'Resources/Info.plist'
  workflow_dispatch:

permissions:
  contents: write

env:
  SIGNING_IDENTITY: 'Developer ID Application: KAI WANG (N2X78TUUFG)'

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.version.outputs.changed }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2
      - id: version
        run: |
          read_version() {
            python3 -c "import plistlib,sys;print(plistlib.load(open(sys.argv[1],'rb'))['CFBundleShortVersionString'])" "$1"
          }
          CURRENT=$(read_version Resources/Info.plist)
          PREVIOUS=""
          if git show HEAD~1:Resources/Info.plist > /tmp/prev.plist 2>/dev/null; then
            PREVIOUS=$(read_version /tmp/prev.plist || true)
          fi
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          if [[ "${{ github.event_name }}" == "workflow_dispatch" || "${CURRENT}" != "${PREVIOUS}" ]]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.changed == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup certificates
        env:
          CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_DEVELOPERID_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_DEVELOPERID_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          security create-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security set-keychain-settings -lut 21600 $RUNNER_TEMP/app-signing.keychain-db
          security unlock-keychain -p actions $RUNNER_TEMP/app-signing.keychain-db
          security default-keychain -s $RUNNER_TEMP/app-signing.keychain-db

          echo "$CERTIFICATE_BASE64" | base64 --decode > $RUNNER_TEMP/cert.p12
          security import $RUNNER_TEMP/cert.p12 -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $RUNNER_TEMP/app-signing.keychain-db

          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k actions $RUNNER_TEMP/app-signing.keychain-db

          mkdir -p ~/private_keys
          echo "$APPLE_API_KEY" | base64 --decode > ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8

      - name: Build universal app bundle
        run: ./scripts/build-app.sh

      - name: Sign app
        run: |
          codesign --force --sign "${SIGNING_IDENTITY}" \
            --options runtime \
            --timestamp \
            "bin/SafariF12.app"

          codesign --verify --deep --strict "bin/SafariF12.app"

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "SafariF12" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 100 \
            --icon "SafariF12.app" 180 170 \
            --hide-extension "SafariF12.app" \
            --app-drop-link 480 170 \
            --codesign "${SIGNING_IDENTITY}" \
            "SafariF12-macos.dmg" \
            "bin/SafariF12.app"

      - name: Notarize DMG
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          xcrun notarytool submit "SafariF12-macos.dmg" \
            --key ~/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8 \
            --key-id "${APPLE_API_KEY_ID}" \
            --issuer "${APPLE_API_ISSUER}" \
            --wait

          xcrun stapler staple "SafariF12-macos.dmg"

      - uses: actions/upload-artifact@v6
        with:
          name: SafariF12-macos
          path: SafariF12-macos.dmg

      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db

  release:
    needs: [check-version, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v6
        with:
          path: artifacts
          merge-multiple: true

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="v${{ needs.check-version.outputs.version }}"
          git tag "${VERSION}"
          git push origin "${VERSION}"
          gh release create "${VERSION}" \
            --title "Release ${VERSION}" \
            --generate-notes \
            artifacts/*

      - name: Update Homebrew tap
        env:
          TAP_TOKEN: ${{ secrets.TAP_GITHUB_TOKEN }}
        run: |
          if [[ -z "${TAP_TOKEN}" ]]; then
            echo "TAP_GITHUB_TOKEN not set, skipping tap update"
            exit 0
          fi
          VERSION="${{ needs.check-version.outputs.version }}"
          SHA256=$(sha256sum artifacts/SafariF12-macos.dmg | cut -d' ' -f1)
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/rxliuli/homebrew-tap.git" tap
          cd tap
          sed -i -E "s/version \"[^\"]+\"/version \"${VERSION}\"/" Casks/safari-f12.rb
          sed -i -E "s/sha256 \"[^\"]+\"/sha256 \"${SHA256}\"/" Casks/safari-f12.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -am "chore: bump safari-f12 to v${VERSION}"
          git push
